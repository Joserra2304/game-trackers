<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<link rel="manifest" href="/game-trackers/manifest.json">
<meta name="theme-color" content="#1a0a2e">
<title>MINA — ACHIEVEMENT TRACKER</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

/* ── PALETA GBC MORADO/AMARILLO ── */
:root{
  /* Pantalla */
  --s0:#0d0818;   /* negro pantalla */
  --s1:#1a0a2e;   /* fondo oscuro */
  --s2:#2d1254;   /* panel */
  --s3:#4a2080;   /* borde */
  --s4:#7a40b0;   /* acento */
  /* Colores */
  --gold:#f5c842;
  --gold2:#c89010;
  --gold3:#8a5c00;
  --purple:#c080ff;
  --purple2:#8040c0;
  --purple3:#4a1890;
  --white:#f8f0ff;
  --dim:#9070c0;
  /* Carcasa */
  --shell:#2e1a50;
  --shell-d:#1a0a30;
  --shell-l:#4a2880;
  --shell-a:#f5c842;   /* botón A amarillo */
  --shell-b:#c080ff;   /* botón B morado */
}

*{box-sizing:border-box;margin:0;padding:0;}
html{background:#0a0418;min-height:100vh;}

.gbc-wrap{
  width:100%;display:flex;flex-direction:column;min-height:100vh;
  border-left:6px solid var(--shell-d);
  border-right:6px solid var(--shell-d);
  box-shadow:
    inset 2px 0 0 var(--shell-l),
    inset -2px 0 0 var(--shell-l),
    -6px 0 20px rgba(120,40,200,0.3),
    6px 0 20px rgba(120,40,200,0.3);
}

/* PANTALLA */
.screen{
  flex:1;background:var(--s0);position:relative;overflow:hidden;
  border-top:8px solid var(--shell-d);
  box-shadow:inset 0 4px 12px rgba(0,0,0,0.8);
}

/* Scanlines moradas */
.screen::after{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:9999;
  background:repeating-linear-gradient(180deg,
    transparent 0,transparent 3px,
    rgba(80,20,140,0.12) 3px,rgba(80,20,140,0.12) 4px);
}

/* Viñeta */
.screen::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:9998;
  background:radial-gradient(ellipse at center,transparent 55%,rgba(10,4,24,0.5) 100%);
}

.blink{animation:bl .8s steps(1) infinite;}
@keyframes bl{50%{opacity:0;}}

/* HEADER */
.s-header{
  background:var(--s1);border-bottom:3px solid var(--gold2);
  padding:10px 8px 8px;text-align:center;
}
.game-title{
  font-family:'Press Start 2P',monospace;font-size:10px;
  color:var(--gold);text-shadow:2px 2px 0 var(--gold3),3px 3px 0 #000;
  letter-spacing:1px;margin-bottom:4px;
}
.tracker-lbl{font-family:'Press Start 2P',monospace;font-size:8px;color:var(--purple);letter-spacing:2px;margin-bottom:2px;}
.tracker-sub{font-family:'Press Start 2P',monospace;font-size:6px;color:var(--dim);letter-spacing:2px;}

/* HUD */
.s-hud{
  background:#000;padding:5px 8px;
  display:flex;align-items:center;gap:8px;
  border-bottom:2px solid var(--s3);
}
.hud-icon{font-size:10px;color:var(--gold);}
.hp-bar{flex:1;height:8px;background:#1a0808;border:2px solid #604000;overflow:hidden;}
.hp-fill{
  height:100%;
  background:linear-gradient(180deg,#ffdd60 0%,#f5c842 50%,#a07000 100%);
  transition:width .3s steps(20);
}
.hud-right{font-family:'Press Start 2P',monospace;font-size:8px;color:var(--gold);white-space:nowrap;}

/* TABS */
.s-tabs{display:flex;background:#000;border-bottom:3px solid var(--s3);}
.tab-btn{
  flex:1;padding:6px 1px;border:none;border-right:2px solid var(--s2);
  background:#000;color:var(--dim);
  font-family:'Press Start 2P',monospace;font-size:5px;cursor:pointer;text-align:center;
}
.tab-btn:last-child{border-right:none;}
.tab-btn .tn{display:block;font-size:9px;margin-bottom:2px;color:inherit;}
.tab-btn.active{background:var(--s2);color:var(--gold);border-bottom:3px solid var(--gold2);}
.tab-content{display:none;}
.tab-content.active{display:block;}

/* PROGRESS */
.s-prog{background:var(--s2);border-bottom:2px solid var(--s3);padding:5px 8px;}
.prog-lbl{display:flex;justify-content:space-between;font-family:'Press Start 2P',monospace;font-size:6px;color:var(--purple2);margin-bottom:3px;}
.prog-lbl span{color:var(--gold);}
.bar-out{height:10px;background:#000;border:2px solid var(--s3);overflow:hidden;box-shadow:inset 0 0 0 1px var(--dim);}
.bar-in{
  height:100%;
  background:repeating-linear-gradient(90deg,var(--gold2) 0,var(--gold2) 5px,var(--gold) 5px,var(--gold) 7px);
  transition:width .3s steps(16);
}

/* PLAT */
.s-plat{
  display:none;margin:6px;padding:10px 6px;
  background:var(--s2);border:3px solid var(--gold);
  text-align:center;animation:bord .8s steps(1) infinite;
}
@keyframes bord{50%{border-color:var(--purple);}}
.s-plat.show{display:block;}
.plat-ico{font-size:18px;margin-bottom:4px;}
.plat-txt{font-family:'Press Start 2P',monospace;font-size:8px;color:var(--gold);margin-bottom:3px;}
.plat-sub{font-family:'Press Start 2P',monospace;font-size:6px;color:var(--purple);}

/* PARTIDA HDR */
.p-hdr{background:var(--s2);border-bottom:2px solid var(--s3);padding:8px;}
.p-name{font-family:'Press Start 2P',monospace;font-size:8px;margin-bottom:3px;}
.p-desc{font-family:'Press Start 2P',monospace;font-size:6px;color:var(--dim);line-height:2;margin-bottom:6px;}
.p-row{display:flex;align-items:center;gap:6px;}
.p-row .bar-out{flex:1;height:8px;}
.p-pct{font-family:'Press Start 2P',monospace;font-size:6px;white-space:nowrap;min-width:36px;text-align:right;}

/* CRON */
.cron{margin:8px;background:#000;border:3px solid var(--gold2);box-shadow:3px 3px 0 #000;padding:8px;}
.cron-ttl{font-family:'Press Start 2P',monospace;font-size:6px;color:var(--gold2);letter-spacing:1px;margin-bottom:6px;text-align:center;}
.cron-lcd{
  background:#0d0800;border:2px solid #402000;
  padding:7px 4px;text-align:center;
  font-family:'Press Start 2P',monospace;font-size:20px;
  color:var(--gold);letter-spacing:6px;
  text-shadow:0 0 8px var(--gold),0 0 2px #fff;
  margin-bottom:6px;
  box-shadow:inset 0 0 20px rgba(80,40,0,0.9);
}
.cron-lcd.warn{color:var(--purple);text-shadow:0 0 8px var(--purple);animation:bl .5s steps(1) infinite;}
.cron-lcd.crit{color:#ff4040;text-shadow:0 0 8px #ff4040;animation:bl .3s steps(1) infinite;}
.cron-btns{display:flex;gap:4px;}
.cron-btn{
  flex:1;padding:6px 2px;background:var(--s1);
  border:2px solid var(--s3);box-shadow:2px 2px 0 #000;
  color:var(--white);font-family:'Press Start 2P',monospace;font-size:6px;
  cursor:pointer;text-align:center;
}
.cron-btn:active{transform:translate(2px,2px);box-shadow:none;}
.cron-btn.start{border-color:var(--gold2);color:var(--gold);}
.cron-btn.pause{border-color:var(--purple2);color:var(--purple);}
.cron-btn.reset{border-color:#600;color:#f08080;}
.cron-sv{font-family:'Press Start 2P',monospace;font-size:5px;color:var(--dim);text-align:center;margin-top:4px;}

/* BOXES */
.box-info{
  margin:5px 8px;padding:6px;
  background:rgba(200,144,16,0.05);border:2px solid var(--gold2);
  box-shadow:2px 2px 0 #000;
  font-family:'Press Start 2P',monospace;font-size:6px;color:var(--gold);line-height:2;
}
.box-warn{
  margin:5px 8px;padding:6px;
  background:rgba(120,40,200,0.08);border:2px solid var(--purple2);
  box-shadow:2px 2px 0 #000;
  font-family:'Press Start 2P',monospace;font-size:6px;color:var(--purple);line-height:2;
}
.box-ttl{display:block;margin-bottom:3px;letter-spacing:1px;}

/* TRINKETS + MODS BOX — al final de P2 */
.box-setup{
  margin:5px 8px 8px;padding:8px;
  background:rgba(245,200,66,0.04);
  border:2px solid var(--gold3);
  box-shadow:2px 2px 0 #000;
  font-family:'Press Start 2P',monospace;font-size:6px;
  color:var(--white);line-height:2.2;
}
.setup-section{margin-bottom:8px;}
.setup-section:last-child{margin-bottom:0;}
.setup-ttl{
  display:block;margin-bottom:5px;
  font-size:6px;letter-spacing:1px;
  padding-bottom:3px;
  border-bottom:2px solid var(--s3);
}
.setup-ttl.gold{color:var(--gold);}
.setup-ttl.purple{color:var(--purple);}

.setup-row{display:flex;align-items:flex-start;gap:5px;margin-bottom:3px;}
.setup-bullet{flex-shrink:0;color:var(--gold2);}
.setup-bullet.p{color:var(--purple2);}
.setup-name{color:var(--white);font-size:6px;}
.setup-why{color:var(--dim);font-size:5px;display:block;margin-top:1px;}

/* CATEGORY */
.cat{border-bottom:2px solid var(--s3);}
.cat-hdr{
  display:flex;align-items:center;justify-content:space-between;
  padding:6px 8px;background:var(--s1);
  cursor:pointer;user-select:none;border-bottom:2px solid var(--s3);
}
.cat-hdr:active{background:var(--s2);}
.cat-lft{display:flex;align-items:center;gap:5px;}
.cat-ico{font-size:11px;}
.cat-nm{font-family:'Press Start 2P',monospace;font-size:6px;color:var(--purple);letter-spacing:1px;}
.cat-rgt{display:flex;align-items:center;gap:5px;font-family:'Press Start 2P',monospace;font-size:6px;color:var(--dim);}
.cat-arr{color:var(--gold2);font-size:7px;transition:transform .1s steps(3);}
.cat.open .cat-arr{transform:rotate(90deg);}
.cat-body{display:none;background:#160c28;}
.cat.open .cat-body{display:block;}

/* TROPHY */
.trophy{
  display:flex;align-items:flex-start;gap:8px;padding:8px;
  border-bottom:2px solid var(--s2);
  cursor:pointer;-webkit-tap-highlight-color:transparent;
  background:#160c28;
}
.trophy:last-child{border-bottom:none;}
.trophy:active{background:var(--s2);}
.px-chk{
  width:12px;height:12px;background:var(--s2);border:2px solid var(--s3);
  box-shadow:2px 2px 0 #000;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;font-size:9px;margin-top:2px;color:var(--gold);
}
.trophy.done .px-chk{background:var(--gold2);border-color:var(--gold);color:#000;}
.t-info{flex:1;min-width:0;}
.t-name{font-family:'Press Start 2P',monospace;font-size:7px;color:var(--white);margin-bottom:3px;line-height:1.8;}
.trophy.done .t-name{color:var(--dim);text-decoration:line-through;text-decoration-color:var(--gold2);}
.t-req{font-family:'Press Start 2P',monospace;font-size:6px;color:#b090e0;line-height:2;margin-bottom:4px;}
.t-meta{display:flex;align-items:center;gap:5px;flex-wrap:wrap;}
.t-badge{
  display:inline-block;font-family:'Press Start 2P',monospace;font-size:5px;
  padding:2px 4px;border:2px solid;box-shadow:2px 2px 0 #000;letter-spacing:1px;
}
.d-easy  {color:var(--gold);  border-color:var(--gold2); background:rgba(245,200,66,0.08);}
.d-medium{color:var(--purple);border-color:var(--purple2);background:rgba(192,128,255,0.08);}
.d-hard  {color:#f08080;      border-color:#800;          background:rgba(200,40,40,0.1);}
.d-insane{color:var(--white); border-color:var(--dim);    background:var(--s2);}
.t-pct{font-family:'Press Start 2P',monospace;font-size:5px;color:var(--dim);}

/* ALL */
.all-ttl{
  padding:5px 8px;font-family:'Press Start 2P',monospace;font-size:6px;
  letter-spacing:1px;background:var(--s2);color:var(--purple);
  border-bottom:2px solid var(--s3);border-top:2px solid var(--s3);
}

/* RESET */
.reset-wrap{padding:10px 8px;text-align:center;background:var(--s1);border-top:2px solid var(--s3);}
.px-btn{
  background:#000;border:2px solid var(--purple2);box-shadow:3px 3px 0 #000;
  color:var(--purple);font-family:'Press Start 2P',monospace;font-size:6px;
  padding:7px 10px;cursor:pointer;letter-spacing:1px;
}
.px-btn:active{transform:translate(3px,3px);box-shadow:none;}
.s-footer{
  padding:5px 8px;text-align:center;font-family:'Press Start 2P',monospace;
  font-size:5px;color:var(--dim);
  border-top:2px solid var(--s3);background:var(--s1);
}

/* BARRA BOTONES */
.controls-bar{
  background:var(--shell);border-top:4px solid var(--shell-d);
  padding:10px 16px 14px;
  display:flex;justify-content:space-between;align-items:center;
  box-shadow:inset 0 2px 0 var(--shell-l),inset 0 -3px 0 var(--shell-d);
}
.dpad{width:48px;height:48px;position:relative;flex-shrink:0;}
.dpad-h,.dpad-v{position:absolute;background:var(--shell-d);border-radius:2px;
  box-shadow:inset 0 1px 0 rgba(255,255,255,0.1),0 2px 0 rgba(0,0,0,0.5);}
.dpad-h{width:100%;height:34%;top:33%;left:0;}
.dpad-v{width:34%;height:100%;top:0;left:33%;}
.dpad-ctr{position:absolute;width:34%;height:34%;top:33%;left:33%;background:var(--shell-d);}
.mid-btns{display:flex;flex-direction:column;align-items:center;gap:10px;}
.mini-row{display:flex;gap:14px;}
.mini-btn{display:flex;flex-direction:column;align-items:center;gap:3px;}
.mini-oval{
  background:var(--shell-d);width:24px;height:7px;border-radius:4px;
  box-shadow:0 2px 0 rgba(0,0,0,0.4);transform:rotate(-15deg);
}
.mini-lbl{font-family:'Press Start 2P',monospace;font-size:4px;color:rgba(255,255,255,0.2);letter-spacing:1px;}
.ab-wrap{display:flex;gap:10px;align-items:center;flex-shrink:0;}
.btn-b,.btn-a{
  border-radius:50%;
  box-shadow:0 3px 0 rgba(0,0,0,0.5),inset 0 1px 0 rgba(255,255,255,0.15);
  font-family:'Press Start 2P',monospace;font-size:6px;
  color:rgba(0,0,0,0.7);
  display:flex;align-items:center;justify-content:center;cursor:default;
}
.btn-b{width:28px;height:28px;background:var(--shell-b);margin-top:12px;color:rgba(255,255,255,0.6);}
.btn-a{width:32px;height:32px;background:var(--shell-a);}

/* LED */
.led{
  position:absolute;top:6px;left:50%;transform:translateX(-50%);
  width:6px;height:6px;background:var(--gold);border-radius:50%;
  box-shadow:0 0 6px var(--gold),0 0 12px rgba(245,200,66,0.6);
  animation:led-p 2s ease-in-out infinite;
}
@keyframes led-p{0%,100%{opacity:1;}50%{opacity:0.5;}}
</style>
</head>
<body>
<div class="gbc-wrap">
  <div class="screen">

    <div class="s-header">
      <div class="game-title">MINA THE HOLLOWER</div>
      <div class="tracker-lbl">ACHIEVEMENT TRACKER</div>
      <div class="tracker-sub">&#9670; STEAM &#9670; <span class="blink">&#9608;</span></div>
    </div>

    <div class="s-hud">
      <span class="hud-icon">&#9829;</span>
      <div class="hp-bar"><div class="hp-fill" id="hpBar" style="width:0%"></div></div>
      <div class="hud-right">&#9670;<span id="hudCount">00/50</span></div>
    </div>

    <div class="s-tabs">
      <button class="tab-btn active" data-tab="0" onclick="showTab('0')"><span class="tn">P1</span>HIST</button>
      <button class="tab-btn" data-tab="1" onclick="showTab('1')"><span class="tn">P2</span>NG+</button>
      <button class="tab-btn" data-tab="2" onclick="showTab('2')"><span class="tn">P3</span>MISC</button>
      <button class="tab-btn" data-tab="any" onclick="showTab('any')"><span class="tn">ANY</span>LIBRE</button>
      <button class="tab-btn" data-tab="all" onclick="showTab('all')"><span class="tn">ALL</span>TODO</button>
    </div>

    <div class="s-prog">
      <div class="prog-lbl">PROGRESO <span id="gPct">0%</span></div>
      <div class="bar-out"><div class="bar-in" id="gBar" style="width:0%"></div></div>
    </div>

    <div class="s-plat" id="platBanner">
      <div class="plat-ico">&#9733;</div>
      <div class="plat-txt">FEAT ACCOMPLI!</div>
      <div class="plat-sub">100% STEAM</div>
    </div>

    <div id="tab-0"   class="tab-content active"></div>
    <div id="tab-1"   class="tab-content"></div>
    <div id="tab-2"   class="tab-content"></div>
    <div id="tab-any" class="tab-content"></div>
    <div id="tab-all" class="tab-content"></div>

    <div class="reset-wrap">
      <button class="px-btn" onclick="resetAll()">&#9632; RESET &#9632;</button>
    </div>
    <div class="s-footer">JOSERRA &#9632; ACHIEVEMENT TRACKER &#9632; 2026</div>
  </div>

  <div class="controls-bar" style="position:relative;">
    <div class="led"></div>
    <div class="dpad"><div class="dpad-h"></div><div class="dpad-v"></div><div class="dpad-ctr"></div></div>
    <div class="mid-btns">
      <div class="mini-row">
        <div class="mini-btn"><div class="mini-oval"></div><div class="mini-lbl">SELECT</div></div>
        <div class="mini-btn"><div class="mini-oval"></div><div class="mini-lbl">START</div></div>
      </div>
    </div>
    <div class="ab-wrap">
      <div class="btn-b">B</div>
      <div class="btn-a">A</div>
    </div>
  </div>
</div>

<script>

const DLBL={easy:'FACIL',medium:'NORMAL',hard:'DIFICIL',insane:'EXTREMO'};

// ── STATE ────────────────────────────────────────────────
let ch={};
function load(){try{const s=localStorage.getItem(SK);if(s)ch=JSON.parse(s);}catch(e){ch={};}}
function save(){try{localStorage.setItem(SK,JSON.stringify(ch));}catch(e){}}
function tog(id){ch[id]=!ch[id];save();render();}
function resetAll(){ch={};save();render();}
function allTs(){let t=[...ANY_CAT.flatMap(c=>c.ts)];PARTIDAS.forEach(p=>p.cats.forEach(c=>t=t.concat(c.ts)));return t;}
function total(){return allTs().length;}
function dn(){return Object.values(ch).filter(Boolean).length;}

// ── CRONÓMETRO ───────────────────────────────────────────
let cronRunning=false, cronInterval=null, warned1h=false;

function cronGetRemaining(){
  try{
    const elapsed=parseInt(localStorage.getItem(CK_ELAPSED)||'0',10);
    if(!cronRunning) return Math.max(0,CT*1000-elapsed);
    const start=parseInt(localStorage.getItem(CK_START)||'0',10);
    return Math.max(0,CT*1000-(elapsed+(Date.now()-start)));
  }catch(e){return CT*1000;}
}

function cronSaveElapsed(){
  try{
    const elapsed=parseInt(localStorage.getItem(CK_ELAPSED)||'0',10);
    const start=parseInt(localStorage.getItem(CK_START)||'0',10);
    localStorage.setItem(CK_ELAPSED,elapsed+(Date.now()-start));
  }catch(e){}
}

function cfmt(ms){
  const s=Math.floor(ms/1000),h=Math.floor(s/3600),m=Math.floor((s%3600)/60),ss=s%60;
  return`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(ss).padStart(2,'0')}`;
}

function cui(){
  const d=document.getElementById('cd'),b=document.getElementById('cb'),
        btn=document.getElementById('csb'),sv=document.getElementById('csv');
  if(!d)return;
  const rem=cronGetRemaining();
  d.textContent=cfmt(rem);
  if(b)b.style.width=(rem/(CT*1000)*100)+'%';
  d.className=rem<=0?'cron-lcd crit':rem<=3600000?'cron-lcd warn':'cron-lcd';
  if(btn){btn.textContent=cronRunning?'PAUSE':'START';btn.className='cron-btn '+(cronRunning?'pause':'start');}
  if(cronRunning&&rem<=3600000&&rem>3590000&&!warned1h){warned1h=true;alert('>> 1 HORA RESTANTE!');}
  if(rem<=0&&cronRunning){cstop();alert('>> GAME OVER: 4H AGOTADAS');}
  if(sv){sv.textContent=cronRunning?'EN CURSO':'';}
}

function cstart(){
  if(cronRunning)return;
  try{localStorage.setItem(CK_START,Date.now());}catch(e){}
  cronRunning=true;
  if(cronGetRemaining()>3600000)warned1h=false;
  cronInterval=setInterval(cui,1000);cui();
}
function cstop(){
  if(!cronRunning)return;
  cronSaveElapsed();cronRunning=false;clearInterval(cronInterval);cui();
}
function ctog(){cronRunning?cstop():cstart();}
function creset(){
  cstop();
  try{localStorage.setItem(CK_ELAPSED,'0');localStorage.removeItem(CK_START);}catch(e){}
  warned1h=false;render();cui();
}

function bCats(cats,pi){
  return cats.map((c,ci)=>{

  <div class="cat-rgt"><span>${cd}/${c.ts.length}</span><span class="cat-arr">&#9658;</span></div>
</div>
<div class="cat-body">${c.ts.map(t=>bT(t)).join('')}</div>
</div>`;}).join('');}

function bP(p,pi){

  let h=`<div class="p-hdr">

<div class="p-desc">${p.desc}</div>
<div class="p-row">

  <div class="p-pct" style="color:${p.col}">${d}/${all.length}</div>

  return h;
