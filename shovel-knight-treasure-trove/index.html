<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<link rel="manifest" href="/game-trackers/manifest.json">
<meta name="theme-color" content="#000000">
<title>SHOVEL KNIGHT — AGT</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

/* ── PALETAS POR CAMPAÑA ──────────────────────────────────
   SK  Shovel of Hope  → Azul cielo #4898e8 / plateado / fondo cielo+hierba
   PK  Plague of Shadows → Verde lima #58b030 / fondo verde bosque oscuro
   SP  Specter of Torment → Rojo #c82020 / negro absoluto
   KK  King of Cards     → Dorado #e8a020 / fondo tierra/marrón
   SH  Showdown          → Rojo #e83020 + Amarillo rayo #f8e020 / fondo rojo oscuro
────────────────────────────────────────────────────────── */
:root{
  /* Globales */
  --hud:#000; --hud2:#1a1a1a; --border:#2a2a2a;
  --white:#f8f8f8; --gray:#b8b8b8; --dim:#606060;
  --grass:#38b838; --grass2:#208820;

  /* SK — azul */
  --sk:     #4898e8; --sk2:#2870c8; --sk3:#1a4078;
  --sk-bg1: #4898e8; --sk-bg2:#78b8f8; --sk-bg3:#38b838;
  --sk-cat: #1a3868; --sk-body:#0a1828; --sk-text:#a8d0f8;

  /* PK — verde lima */
  --pk:     #58b030; --pk2:#387818; --pk3:#204010;
  --pk-bg1: #1a3010; --pk-bg2:#2a5018; --pk-bg3:#182808;
  --pk-cat: #1a3808; --pk-body:#0a1808; --pk-text:#88d058;

  /* SP — rojo/negro */
  --sp:     #c82020; --sp2:#880808; --sp3:#400000;
  --sp-bg1: #000000; --sp-bg2:#180008; --sp-bg3:#080000;
  --sp-cat: #180000; --sp-body:#080000; --sp-text:#ff8080;

  /* KK — dorado */
  --kk:     #e8a020; --kk2:#a06010; --kk3:#604010;
  --kk-bg1: #604010; --kk-bg2:#a07830; --kk-bg3:#402808;
  --kk-cat: #402000; --kk-body:#200c00; --kk-text:#f8d080;

  /* SH — rojo+amarillo rayo */
  --sh:     #f8e020; --sh2:#e83020; --sh3:#201000;
  --sh-bg1: #200800; --sh-bg2:#602008; --sh-bg3:#181000;
  --sh-cat: #200800; --sh-body:#100400; --sh-text:#f8e080;
}

*{box-sizing:border-box;margin:0;padding:0;}
html{background:#000;min-height:100vh;}

.wrap{width:100%;display:flex;flex-direction:column;min-height:100vh;}

/* ── PANTALLA ── */
.screen{flex:1;background:#000;position:relative;overflow:hidden;border-top:4px solid #000;}

.screen::after{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:9999;
  background:repeating-linear-gradient(180deg,transparent 0,transparent 2px,rgba(0,0,0,0.1) 2px,rgba(0,0,0,0.1) 3px);
}

.blink{animation:bl .8s steps(1) infinite;}
@keyframes bl{50%{opacity:0;}}

/* ── HUD ── */
.hud-bar{background:#000;border-bottom:4px solid #282828;}

.player-bars{display:flex;background:#000;border-bottom:2px solid #282828;}
.player-slot{flex:1;padding:4px 5px;border-right:2px solid #282828;}
.player-slot:last-child{border-right:none;}
.ps-name{font-family:'Press Start 2P',monospace;font-size:5px;padding:2px 4px;display:inline-block;letter-spacing:0;}
.ps-gems{display:flex;gap:2px;margin-top:2px;}
.gem{width:7px;height:7px;border-radius:1px;}

.hud-center{background:#000;padding:8px 8px 6px;text-align:center;border-bottom:2px solid #282828;}
.game-title{font-family:'Press Start 2P',monospace;font-size:10px;color:#f8f8f8;text-shadow:2px 2px 0 #383838;letter-spacing:1px;margin-bottom:3px;}
.game-sub{font-family:'Press Start 2P',monospace;font-size:7px;color:#e8a020;letter-spacing:2px;margin-bottom:2px;}
.game-sub2{font-family:'Press Start 2P',monospace;font-size:5px;color:var(--dim);letter-spacing:2px;}

/* ── BARRA PROGRESO GLOBAL ── */
.prog-wrap{background:#000;padding:5px 8px;border-bottom:3px solid #282828;}
.prog-lbl{display:flex;justify-content:space-between;font-family:'Press Start 2P',monospace;font-size:6px;color:var(--dim);margin-bottom:3px;}
.prog-lbl span{color:#f8c840;}
.bar-out{height:10px;background:#282828;border:2px solid #383838;overflow:hidden;}
.bar-in{height:100%;background:repeating-linear-gradient(90deg,#c07000 0,#c07000 5px,#f8c840 5px,#f8c840 7px);transition:width .3s steps(16);}

/* ── TABS ── */
.tab-nav{display:flex;background:#000;border-bottom:4px solid #383838;overflow-x:auto;scrollbar-width:none;}
.tab-nav::-webkit-scrollbar{display:none;}
.tab-btn{flex:1;min-width:52px;padding:5px 2px;border:none;border-right:2px solid #282828;background:#000;color:#505050;font-family:'Press Start 2P',monospace;font-size:5px;cursor:pointer;text-align:center;}
.tab-btn:last-child{border-right:none;}
.tab-btn .tn{display:block;font-size:8px;margin-bottom:2px;color:inherit;}

/* Tab activo — color de campaña */
.tab-btn[data-tab="0"].active{background:var(--sk2);color:#f8f8f8;}
.tab-btn[data-tab="1"].active{background:var(--pk2);color:#f8f8f8;}
.tab-btn[data-tab="2"].active{background:var(--sp2);color:#f8f8f8;}
.tab-btn[data-tab="3"].active{background:var(--kk2);color:#f8f8f8;}
.tab-btn[data-tab="4"].active{background:linear-gradient(90deg,var(--sh2),var(--sh));color:#000;}
.tab-btn[data-tab="all"].active{background:#383838;color:#f8f8f8;}

.tab-content{display:none;}
.tab-content.active{display:block;}

/* ── PLAT ── */
.s-plat{display:none;margin:6px;padding:10px 6px;background:#000;border:4px solid #f8c840;text-align:center;animation:bord .8s steps(1) infinite;}
@keyframes bord{50%{border-color:#c07000;}}
.s-plat.show{display:block;}
.plat-ico{font-size:18px;margin-bottom:4px;}
.plat-txt{font-family:'Press Start 2P',monospace;font-size:8px;color:#f8c840;margin-bottom:3px;}
.plat-sub{font-family:'Press Start 2P',monospace;font-size:6px;color:#c07000;}

/* ── CAMPAIGN HEADER — cada uno con su fondo ── */
.camp-hdr{padding:10px 8px 8px;border-bottom:4px solid #000;position:relative;overflow:hidden;}

/* Borde izquierdo grueso de color campaña */
.camp-hdr::after{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;}

.camp-title{font-family:'Press Start 2P',monospace;font-size:9px;margin-bottom:3px;text-shadow:2px 2px 0 rgba(0,0,0,0.6);}
.camp-desc{font-family:'Press Start 2P',monospace;font-size:6px;line-height:2;margin-bottom:6px;opacity:0.7;}
.camp-row{display:flex;align-items:center;gap:6px;}
.camp-bar{flex:1;height:8px;background:rgba(0,0,0,0.4);border:2px solid rgba(0,0,0,0.5);overflow:hidden;}
.camp-bar-fill{height:100%;transition:width .3s steps(16);}
.camp-pct{font-family:'Press Start 2P',monospace;font-size:6px;white-space:nowrap;min-width:36px;text-align:right;}

/* ── BOXES ── */
.box-info{margin:5px 8px;padding:6px;font-family:'Press Start 2P',monospace;font-size:6px;line-height:2;border:2px solid;box-shadow:2px 2px 0 #000;}
.box-warn{margin:5px 8px;padding:6px;font-family:'Press Start 2P',monospace;font-size:6px;line-height:2;border:2px solid rgba(200,32,32,0.6);box-shadow:2px 2px 0 #000;color:#ff8080;background:rgba(200,32,32,0.06);}
.box-ttl{display:block;margin-bottom:3px;letter-spacing:1px;}

/* ── CATEGORY ── */
.cat{border-bottom:2px solid rgba(0,0,0,0.5);}
.cat-hdr{display:flex;align-items:center;justify-content:space-between;padding:6px 8px;cursor:pointer;user-select:none;border-bottom:2px solid rgba(0,0,0,0.3);}
.cat-hdr:active{filter:brightness(1.2);}
.cat-lft{display:flex;align-items:center;gap:5px;}
.cat-ico{font-size:11px;}
.cat-nm{font-family:'Press Start 2P',monospace;font-size:6px;letter-spacing:1px;}
.cat-rgt{display:flex;align-items:center;gap:5px;font-family:'Press Start 2P',monospace;font-size:6px;opacity:0.7;}
.cat-arr{font-size:7px;transition:transform .1s steps(3);}
.cat.open .cat-arr{transform:rotate(90deg);}
.cat-body{display:none;}
.cat.open .cat-body{display:block;}

/* ── TROPHY ── */
.trophy{display:flex;align-items:flex-start;gap:8px;padding:8px;border-bottom:2px solid rgba(0,0,0,0.5);cursor:pointer;-webkit-tap-highlight-color:transparent;}
.trophy:last-child{border-bottom:none;}
.trophy:active{filter:brightness(1.3);}
.px-chk{width:12px;height:12px;border:2px solid rgba(255,255,255,0.3);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:9px;margin-top:2px;background:rgba(0,0,0,0.3);}
.trophy.done .px-chk{background:var(--grass2);border-color:var(--grass);color:#fff;}
.t-info{flex:1;min-width:0;}
.t-name{font-family:'Press Start 2P',monospace;font-size:7px;color:#f8f8f8;margin-bottom:3px;line-height:1.8;text-shadow:1px 1px 0 #000;}
.trophy.done .t-name{color:rgba(255,255,255,0.35);text-decoration:line-through;text-decoration-color:var(--grass);}
.t-req{font-family:'Press Start 2P',monospace;font-size:6px;line-height:2;margin-bottom:4px;text-shadow:1px 1px 0 #000;}
.t-meta{display:flex;align-items:center;gap:5px;flex-wrap:wrap;}
.t-badge{display:inline-block;font-family:'Press Start 2P',monospace;font-size:5px;padding:2px 4px;border:2px solid;box-shadow:2px 2px 0 #000;letter-spacing:1px;}

/* Badges universales — se ven bien sobre cualquier fondo oscuro */
.d-easy  {color:#78e878;border-color:#208820;background:rgba(120,232,120,0.1);}
.d-medium{color:#f8d840;border-color:#a07800;background:rgba(248,216,64,0.1);}
.d-hard  {color:#ff9840;border-color:#904000;background:rgba(255,152,64,0.1);}
.d-insane{color:#ff5050;border-color:#800000;background:rgba(255,80,80,0.1);}
.t-pct{font-family:'Press Start 2P',monospace;font-size:5px;color:rgba(255,255,255,0.35);}

/* ALL */
.all-ttl{padding:5px 8px;font-family:'Press Start 2P',monospace;font-size:6px;letter-spacing:1px;background:#000;border-bottom:2px solid #282828;border-top:2px solid #282828;}

/* RESET */
.reset-wrap{padding:10px 8px;text-align:center;background:#000;border-top:3px solid #282828;}
.px-btn{background:#000;border:2px solid #c02020;box-shadow:3px 3px 0 #000;color:#c02020;font-family:'Press Start 2P',monospace;font-size:6px;padding:7px 10px;cursor:pointer;letter-spacing:1px;}
.px-btn:active{transform:translate(3px,3px);box-shadow:none;}
.s-footer{padding:5px 8px;text-align:center;font-family:'Press Start 2P',monospace;font-size:5px;color:#505050;border-top:2px solid #282828;background:#000;}

/* ── BARRA BOTONES NES ── */
.controls-bar{background:#c0b8b0;border-top:4px solid #706860;padding:10px 16px 14px;display:flex;justify-content:space-between;align-items:center;box-shadow:inset 0 2px 0 #e0d8d0,inset 0 -3px 0 #706860;}
.dpad{width:48px;height:48px;position:relative;flex-shrink:0;}
.dpad-h,.dpad-v{position:absolute;background:#585050;border-radius:2px;box-shadow:inset 0 1px 0 rgba(255,255,255,0.15),0 2px 0 rgba(0,0,0,0.4);}
.dpad-h{width:100%;height:34%;top:33%;left:0;}
.dpad-v{width:34%;height:100%;top:0;left:33%;}
.dpad-ctr{position:absolute;width:34%;height:34%;top:33%;left:33%;background:#585050;}
.mid-btns{display:flex;flex-direction:column;align-items:center;gap:8px;}
.mini-row{display:flex;gap:12px;}
.mini-btn{display:flex;flex-direction:column;align-items:center;gap:3px;}
.mini-oval{background:#706860;width:22px;height:6px;border-radius:3px;box-shadow:0 2px 0 rgba(0,0,0,0.3);transform:rotate(-15deg);}
.mini-lbl{font-family:'Press Start 2P',monospace;font-size:4px;color:rgba(0,0,0,0.4);letter-spacing:1px;}
.ab-wrap{display:flex;gap:8px;align-items:center;flex-shrink:0;}
.btn-b,.btn-a{border-radius:50%;box-shadow:0 3px 0 rgba(0,0,0,0.4),inset 0 1px 0 rgba(255,255,255,0.2);font-family:'Press Start 2P',monospace;font-size:6px;color:rgba(255,255,255,0.85);display:flex;align-items:center;justify-content:center;cursor:default;}
.btn-b{width:28px;height:28px;background:#8020a0;margin-top:12px;}
.btn-a{width:32px;height:32px;background:#c02020;}
</style>
</head>
<body>
<div class="wrap">
<div class="screen">

  <div class="hud-bar">
    <div class="player-bars">
      <div class="player-slot">
        <span class="ps-name" style="background:var(--sk2);color:#fff">-SHOVEL-</span>
        <div class="ps-gems" id="gems-sk"></div>
      </div>
      <div class="player-slot">
        <span class="ps-name" style="background:var(--pk2);color:#fff">-PLAGUE-</span>
        <div class="ps-gems" id="gems-pk"></div>
      </div>
      <div class="player-slot">
        <span class="ps-name" style="background:var(--sp2);color:#fff">-SPECTER-</span>
        <div class="ps-gems" id="gems-sp"></div>
      </div>
      <div class="player-slot">
        <span class="ps-name" style="background:var(--kk2);color:#fff">-KING-</span>
        <div class="ps-gems" id="gems-kk"></div>
      </div>
      <div class="player-slot">
        <span class="ps-name" style="background:linear-gradient(90deg,var(--sh2),var(--sh));color:#000">-SHOW-</span>
        <div class="ps-gems" id="gems-sh"></div>
      </div>
    </div>
    <div class="hud-center">
      <div class="game-title">SHOVEL KNIGHT</div>
      <div class="game-sub">&#9670; TREASURE TROVE &#9670;</div>
      <div class="game-sub2">ACHIEVEMENT TRACKER &#9632; STEAM EDITION <span class="blink">&#9608;</span></div>
    </div>
  </div>

  <div class="prog-wrap">
    <div class="prog-lbl">TOTAL PROGRESS <span id="gPct">0%</span></div>
    <div class="bar-out"><div class="bar-in" id="gBar" style="width:0%"></div></div>
  </div>

  <div class="tab-nav">
    <button class="tab-btn active" data-tab="0" onclick="showTab('0')"><span class="tn">&#9824;</span>SHOVEL</button>
    <button class="tab-btn" data-tab="1" onclick="showTab('1')"><span class="tn">&#9825;</span>PLAGUE</button>
    <button class="tab-btn" data-tab="2" onclick="showTab('2')"><span class="tn">&#9830;</span>SPECTER</button>
    <button class="tab-btn" data-tab="3" onclick="showTab('3')"><span class="tn">&#9827;</span>KING</button>
    <button class="tab-btn" data-tab="4" onclick="showTab('4')"><span class="tn">&#9733;</span>SHOW</button>
    <button class="tab-btn" data-tab="all" onclick="showTab('all')"><span class="tn">&#9632;</span>ALL</button>
  </div>

  <div class="s-plat" id="platBanner">
    <div class="plat-ico">&#9733;</div>
    <div class="plat-txt">TREASURE COMPLETE!</div>
    <div class="plat-sub">138/138 ACHIEVEMENTS</div>
  </div>

  <div id="tab-0" class="tab-content active"></div>
  <div id="tab-1" class="tab-content"></div>
  <div id="tab-2" class="tab-content"></div>
  <div id="tab-3" class="tab-content"></div>
  <div id="tab-4" class="tab-content"></div>
  <div id="tab-all" class="tab-content"></div>

  <div class="reset-wrap"><button class="px-btn" onclick="resetAll()">&#9632; RESET &#9632;</button></div>
  <div class="s-footer">AGT &#9632; SHOVEL KNIGHT: TREASURE TROVE &#9632; STEAM EDITION</div>
</div>

<div class="controls-bar">
  <div class="dpad"><div class="dpad-h"></div><div class="dpad-v"></div><div class="dpad-ctr"></div></div>
  <div class="mid-btns"><div class="mini-row">
    <div class="mini-btn"><div class="mini-oval"></div><div class="mini-lbl">SELECT</div></div>
    <div class="mini-btn"><div class="mini-oval"></div><div class="mini-lbl">START</div></div>
  </div></div>
  <div class="ab-wrap"><div class="btn-b">B</div><div class="btn-a">A</div></div>
</div>
</div>

<script>
const SK_KEY='sk_platinum_v1';
const DLBL={easy:'EASY',medium:'NORMAL',hard:'HARD',insane:'EXPERT'};

const C={

// ── STATE ─────────────────────────────────────────────────
let ch={};
function load(){try{const s=localStorage.getItem(SK_KEY);if(s)ch=JSON.parse(s);}catch(e){ch={};}}
function save(){try{localStorage.setItem(SK_KEY,JSON.stringify(ch));}catch(e){}}
function tog(id){ch[id]=!ch[id];save();render();}
function resetAll(){ch={};save();render();}
function allTs(){return CAMPANAS.flatMap(c=>c.cats.flatMap(cat=>cat.ts));}
function total(){return allTs().length;}
function dn(){return Object.values(ch).filter(Boolean).length;}

function buildGems(ck,done,tot){
  const p=tot?done/tot:0,f=Math.round(p*5),col=C[ck].col;
  return Array.from({length:5},(_,i)=>
    `<div class="gem" style="background:${i<f?col:'#282828'};${i<f?`box-shadow:0 0 3px ${col};`:''}"></div>`
  ).join('');}

function bT(t,ck){
  const ok=!!ch[t.id];
  const p=C[ck];
  return`<div class="trophy${ok?' done':''}" onclick="tog('${t.id}')" style="background:${p.body};">
<div class="px-chk">${ok?'&#10003;':''}</div>
<div class="t-info">
  <div class="t-name">${t.nm}</div>
  <div class="t-req" style="color:${p.txt}">${t.req}</div>
  <div class="t-meta">
    <span class="t-badge d-${t.dif}">${DLBL[t.dif]}</span>
    <span class="t-pct">STEAM:${t.pct}</span>
  </div>
</div>
</div>`;}

function bCats(cats,pi,ck){
  const p=C[ck];
  return cats.map((c,ci)=>{
    const id=`c${pi}_${ci}`,cd=c.ts.filter(t=>ch[t.id]).length;
    return`<div class="cat open" id="${id}">
<div class="cat-hdr" style="background:${p.cat}" onclick="tc('${id}')">
  <div class="cat-lft"><span class="cat-ico">${c.ico}</span><span class="cat-nm" style="color:${p.col}">${c.nm}</span></div>
  <div class="cat-rgt"><span>${cd}/${c.ts.length}</span><span class="cat-arr" style="color:${p.col}">&#9658;</span></div>
</div>
<div class="cat-body">${c.ts.map(t=>bT(t,ck)).join('')}</div>
</div>`;}).join('');}

function bCamp(camp){
  const p=C[camp.ck];
  const all=camp.cats.flatMap(c=>c.ts);
  const d=all.filter(t=>ch[t.id]).length;
  const pct=all.length?Math.round(d/all.length*100):0;
  let h=`<div class="camp-hdr" style="background:${p.barBg};">
<div class="camp-title" style="color:${p.col}">&#9658; ${camp.name}</div>
<div class="camp-desc" style="color:${p.txt}">${camp.desc}</div>
<div class="camp-row">
  <div class="camp-bar"><div class="camp-bar-fill" style="width:${pct}%;${p.bar}"></div></div>
  <div class="camp-pct" style="color:${p.col}">${d}/${all.length}</div>
</div>
</div>`;
  if(camp.info)h+=`<div class="box-info" style="border-color:${p.boxBorder};background:${p.boxBg};color:${p.boxTxt}"><span class="box-ttl">&#9658; GUIDE</span>${camp.info}</div>`;
  if(camp.warn)h+=`<div class="box-warn"><span class="box-ttl">&#9658; ATENCION</span>${camp.warn}</div>`;
  h+=bCats(camp.cats,camp.id,camp.ck);
  return h;
}

function bAll(){
  let h='';
  CAMPANAS.forEach(camp=>{
    const p=C[camp.ck];
    h+=`<div class="all-ttl" style="color:${p.col};background:${p.cat}">&#9658; ${camp.name}</div>`;
    camp.cats.forEach(c=>c.ts.forEach(t=>{h+=bT(t,camp.ck);}));
  });
  const ok=dn()>=total();
  h+=`<div class="all-ttl" style="color:#f8c840">&#9658; 100% COMPLETE</div>
<div class="trophy${ok?' done':''}" style="background:#000;">
<div class="px-chk">${ok?'&#10003;':''}</div>
<div class="t-info">
  <div class="t-name">TREASURE COMPLETE</div>
  <div class="t-req" style="color:#606060">Consigue los 138 logros</div>
  <div class="t-meta"><span class="t-badge d-insane">EXPERT</span><span class="t-pct">STEAM:~0.8%</span></div>
</div>
</div>`;return h;}

function render(){
  const d=dn(),tot=total(),pct=tot?Math.round(d/tot*100):0;
  CAMPANAS.forEach(camp=>{
    const el=document.getElementById('gems-'+CAMP_KEYS[camp.id]);
    if(!el)return;
    const all=camp.cats.flatMap(c=>c.ts);
    const cd=all.filter(t=>ch[t.id]).length;
    el.innerHTML=buildGems(camp.ck,cd,all.length);
  });
  const gb=document.getElementById('gBar');if(gb)gb.style.width=pct+'%';
  const gp=document.getElementById('gPct');if(gp)gp.textContent=pct+'%';
  document.getElementById('platBanner').classList.toggle('show',d>=tot);
  CAMPANAS.forEach(camp=>document.getElementById('tab-'+camp.tab).innerHTML=bCamp(camp));
  document.getElementById('tab-all').innerHTML=bAll();
}

function tc(id){document.getElementById(id).classList.toggle('open');}
function showTab(t){
  document.querySelectorAll('.tab-content').forEach(e=>e.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(e=>e.classList.remove('active'));
  document.getElementById('tab-'+t).classList.add('active');
  document.querySelector(`[data-tab="${t}"]`).classList.add('active');
}

load();render();
</script>
